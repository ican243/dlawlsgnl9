<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <script type="text/javascript" src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB47KVlBv6q3JPqkdkAjCDesRq1p32VeVo">
    </script>
</head>

<body>
    <script type="text/javascript">
        // 기본 마커 사용 (marker.jpg 파일이 없어서 주석 처리)
        // var markerIcon = {
        //     url: "image3/marker.jpg",
        //     scaledSize: new google.maps.Size(30, 30)
        // };

        function MyPos() {
            alert("MyPos()");
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(CurPosition, ErrorCallback);
            }
        }

        function CurPosition(position) {
            var lat = position.coords.latitude;
            var lng = position.coords.longitude;
            document.getElementById("result").innerHTML = "위도: " + lat + "<br>경도: " + lng;

            var latlng = new google.maps.LatLng(lat, lng);

            var options = {
                zoom: 15,
                center: latlng
            };

            var map = new google.maps.Map(
                document.getElementById("map"),
                options
            );

            var marker = new google.maps.Marker({
                map: map,
                // icon: markerIcon,  // 기본 마커 사용
                title: "현재 위치",
                position: latlng
            });
        }

        function ErrorCallback(error) {
            switch (error.code) {
                case error.PERMISSION_DENIED:
                    document.getElementById("result").innerHTML = "현재 위치 정보에 대한 권한이 없습니다.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    document.getElementById("result").innerHTML = "현재 위치 정보를 구할 수 없습니다.";
                    break;
                case error.TIMEOUT:
                    document.getElementById("result").innerHTML = "시간 제한을 초과했습니다.";
                    break;
            }
        }
    </script>

    <button onClick="MyPos()" type="button">현재 나의 위치</button>
    <div id="result"></div>
    <div id="map" style="width: 500px; height:500px"></div>

</body>

</html>
