<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
</head>

<body>
    <button onclick="MyPos()" type="button">현재 나의 위치</button>
    <div id="result"></div>
    <div id="map" style="width:100%; height:700px;"></div>

    <script>
        let map;
        let marker;

        function MyPos() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(CurPosition, ErrorCallback);
            } else {
                document.getElementById("result").innerHTML = "위치 정보를 지원하지 않습니다.";
            }
        }

        function CurPosition(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            document.getElementById("result").innerHTML =
                "위도: " + lat + "<br>경도: " + lng;

            const latlng = new google.maps.LatLng(lat, lng);

            if (!map) {
                map = new google.maps.Map(document.getElementById("map"), {
                    zoom: 13,
                    center: latlng,
                    draggable: true
                });

                marker = new google.maps.Marker({
                    map: map,
                    title: "현재 위치",
                    position: latlng
                });
            } else {
                map.setCenter(latlng);
                marker.setPosition(latlng);
            }
        }

        function ErrorCallback(error) {
            switch (error.code) {
                case error.PERMISSION_DENIED:
                    document.getElementById("result").innerHTML = "현재 위치 권한이 없습니다.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    document.getElementById("result").innerHTML = "현재 위치 정보를 구할 수 없습니다.";
                    break;
                case error.TIMEOUT:
                    document.getElementById("result").innerHTML = "시간 제한을 초과했습니다.";
                    break;
                default:
                    document.getElementById("result").innerHTML = "알 수 없는 오류입니다.";
            }
        }

        function initMap() { }
    </script>

    <script async defer src="https://maps.googleapis.com/maps/api/js?key=네실제키&callback=initMap">
    </script>


</body>

</html>
